name: Code Analysis
on:
  workflow_call:

jobs:

  # biome を reviewdog で実行
  # https://biomejs.dev/
  # https://github.com/mongolyy/reviewdog-action-biome
  biome:
    name: Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: mongolyy/reviewdog-action-biome@58f27dce74f1f648943d3a88de554385727ce11b # v2.11.1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          fail_level: error # エラーレベルがあれば失敗. エラー以外は成功でコメントを残す

  # typos を reviewdog で実行
  # https://github.com/crate-ci/typos
  # https://github.com/reviewdog/action-typos
  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: reviewdog/action-typos@d5eb1bbcd1b3bfde596f6eeb470322727862fe98 # v1.19.0
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          fail_level: error # エラーレベルがあれば失敗. エラー以外は成功でコメントを残す

  # gitleak を reviewdog で実行
  # https://github.com/gitleaks/gitleaks
  # https://github.com/reviewdog/action-gitleaks
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: reviewdog/action-gitleaks@2b7b5685e3e3eecddab5d30cfa04f18123031421 # v1.8.0
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          fail_level: error # エラーレベルがあれば失敗. エラー以外は成功でコメントを残す

